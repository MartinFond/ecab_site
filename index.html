    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escrime Club Andrézieux-Bouthéon</title>
    <!-- Description affichée par Google sous le titre dans les résultats de
         recherche. ~150 caractères, avec les mots que les gens cherchent
         (escrime, ville, disciplines). Modifiable librement. -->

      name="description"
      content="Escrime Club d'Andrézieux-Bouthéon (ECAB) : cours de fleuret et d'épée pour enfants, ados et adultes, du loisir à la compétition. Cours d'essai gratuit !"
    />
    <!-- Adresse « officielle » du site pour Google (évite les doublons). Si
         vous passez un jour à un vrai nom de domaine, remplacez l'URL ici. -->
    <link rel="canonical" href="https://escrime-club-andrezieux.github.io/" />
    <!-- Preuve que le club est propriétaire du site, pour Google Search
         Console. À ne pas supprimer : Google revérifie régulièrement. -->
    <meta name="google-site-verification" content="2xP8rseZVM0vincLCgumj-isiLkPZklZyPi_2vTpsQg" />
  </head>
